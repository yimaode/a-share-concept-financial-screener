name: Bug report
description: 报告可复现的软件问题；不要上传凭证或私有投资数据
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 请先删除日志中的 API Key、Cookie、持仓、自选股和私人研究内容。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？预期是什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 最小复现步骤
      description: 请使用公开股票代码或合成数据。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python 与操作系统
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏日志
      render: shell
